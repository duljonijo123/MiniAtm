<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BRILink FALink</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f6fb;
}

.header{
background:linear-gradient(120deg,#0057b8,#0099ff);
color:white;
padding:30px;
text-align:center;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
margin-bottom:20px;
}

button{
background:#0057b8;
color:white;
border:none;
padding:10px 20px;
border-radius:6px;
cursor:pointer;
}

.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:white;
padding:15px 20px;
border-radius:50px;
text-decoration:none;
font-weight:bold;
}

</style>

<script>

function hitungBiaya(){

let layanan=document.getElementById("layanan").value
let biaya=0

if(layanan=="tarik"){
biaya=5000
}

if(layanan=="transfer"){
biaya=7000
}

if(layanan=="pulsa"){
biaya=2000
}

document.getElementById("hasil").innerHTML="Biaya Admin: Rp "+biaya

}

let nomor=0

function ambilAntrian(){
nomor++
document.getElementById("antrian").innerHTML="Nomor Antrian Anda: "+nomor
}

</script>

</head>

<body>

<div class="header">
<h1>BRILink FALink</h1>
<p>Transaksi Mudah Dekat Rumah</p>
</div>

<div class="container">

<div class="card">

<h2>Kalkulator Biaya Admin</h2>

<select id="layanan">

<option value="tarik">Tarik Tunai</option>
<option value="transfer">Transfer</option>
<option value="pulsa">Pulsa</option>

</select>

<button onclick="hitungBiaya()">Cek Biaya</button>

<p id="hasil"></p>

</div>


<div class="card">

<h2>Ambil Nomor Antrian</h2>

<button onclick="ambilAntrian()">Ambil Antrian</button>

<p id="antrian"></p>

</div>


<div class="card">

<h2>Layanan</h2>

<p>💰 Tarik Tunai</p>
<p>🔁 Transfer Bank</p>
<p>📱 Pulsa</p>
<p>📶 Paket Data</p>
<p>💡 Listrik</p>

</div>

</div>
